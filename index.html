<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NashmiMC Staff Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg-0:#070b14;
  --bg-1:#0c1424;
  --bg-2:#111d33;
  --panel:#0f1a2e;
  --panel-2:#132542;
  --line:#1f3352;
  --line-soft:#182a47;
  --sky:#38bdf8;
  --sky-dim:#1a3a52;
  --indigo:#6366f1;
  --gold:#e0b34c;
  --gold-dim:#3a2f14;
  --green:#3ecf8e;
  --green-dim:#123626;
  --red:#f16565;
  --red-dim:#3a1620;
  --orange:#f0a24d;
  --orange-dim:#3a2712;
  --text-0:#eef3fb;
  --text-1:#a9b7cf;
  --text-2:#6c7c99;
  --radius:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  background:radial-gradient(circle at 80% -10%, #14243f 0%, var(--bg-0) 45%);
  color:var(--text-0);
  font-family:'Tajawal',sans-serif;
  min-height:100vh;
  direction:rtl;
}
h1,h2,h3{font-family:'Rajdhani','Tajawal',sans-serif;}
button{cursor:pointer;}
.hidden{display:none !important;}
#loginScreen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden;}
.login-card{width:100%;max-width:420px;background:linear-gradient(180deg, var(--panel-2), var(--panel));border:1px solid var(--line);border-radius:20px;padding:36px 32px 28px;}
.btn-primary{width:100%;padding:12px;border-radius:10px;border:none;background:linear-gradient(90deg, var(--sky), var(--indigo));color:#04101d;font-weight:700;}
.toast{position:fixed;bottom:20px;left:20px;background:#1f2a44;border-left:4px solid #38bdf8;padding:12px 16px;border-radius:8px;color:white;z-index:1000;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <h2 style="text-align:center;margin:0 0 20px;">NashmiMC Staff Hub</h2>
    <label>اسم المستخدم</label><br>
    <input class="field" id="loginUser" style="width:100%;padding:10px;margin:8px 0;" placeholder="nashmi_admin" /><br><br>
    
    <button class="btn-primary" onclick="handleLogin()">تسجيل الدخول</button><br><br>
    <button onclick="quickLoginDemo()" style="width:100%;padding:12px;background:#5865f2;color:white;border:none;border-radius:10px;">تسجيل دخول تجريبي (Owner)</button>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <h1 style="text-align:center;padding:40px;">✅ تم تسجيل الدخول بنجاح!</h1>
  <p style="text-align:center;">النظام يعمل الآن.</p>
  <button onclick="handleLogout()" style="display:block;margin:30px auto;padding:12px 24px;">تسجيل الخروج</button>
</div>

<div id="toast" class="toast hidden"></div>

<script>
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.remove('hidden');
  setTimeout(() => toast.classList.add('hidden'), 3000);
}

function handleLogin() {
  const user = document.getElementById('loginUser').value.trim();
  if (!user) {
    showToast("يرجى إدخال اسم المستخدم");
    return;
  }
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  showToast("تم تسجيل الدخول بنجاح!");
}

function quickLoginDemo() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  showToast("تم تسجيل الدخول كـ Owner");
}

function handleLogout() {
  document.getElementById('app').classList.add('hidden');
  document.getElementById('loginScreen').classList.remove('hidden');
  showToast("تم تسجيل الخروج");
}

// Auto focus
document.getElementById('loginUser').focus();
</script>
</body>
</html>
